solution:
  created-for: ARM::SSE_320_BSP@1.0.0
  description: Blinky example

  packs:
    - pack: ARM::CMSIS@>=6.0.0
    - pack: ARM::CMSIS-Compiler@>=2.0.0
    - pack: ARM::SSE_320_BSP

  cdefault:

  target-types:
    - type: SSE-320-FVP
      board: SSE-320
      device: SSE-320-FVP

  build-types:
    - type: Debug
      debug: on
      optimize: none

    - type: Release
      debug: off
      optimize: balanced

  projects:
    - project: ./Blinky/Blinky.cproject.yml

  output-dirs:
    cprjdir: ./build/$TargetType$/$Compiler$/$BuildType$/$Project$
    intdir:  ./build/$TargetType$/$Compiler$/$BuildType$/$Project$/intdir
    outdir:  ./build/$TargetType$/$Compiler$/$BuildType$/$Project$/outdir
